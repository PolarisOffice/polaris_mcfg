name: 🐛 Bug report
description: 동작이 기대와 다르거나 예외가 발생하는 경우
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        제보 감사합니다. **보안 취약점은 [SECURITY.md](../SECURITY.md)의 비공개 채널을 사용해주세요** — 공개 이슈에 올리지 말아주세요.

        제출 전 [ROADMAP.md](../ROADMAP.md)의 §1 지원 범위 매트릭스 / §2 알려진 한계를 확인해주시면 시간을 아낄 수 있습니다.

  - type: input
    id: version
    attributes:
      label: Polaris MCFG 버전
      description: "`mcfg --version` 또는 git commit hash"
      placeholder: "0.2.3 / 8954351"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python 버전
      placeholder: "3.13.2"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 운영체제
      options:
        - macOS
        - Linux
        - Windows
        - 기타 (설명에 적어주세요)
    validations:
      required: true

  - type: dropdown
    id: subcommand
    attributes:
      label: 영향 받는 서브커맨드
      options:
        - extract
        - compare
        - generate
        - validate
        - 여러 개
        - 라이브러리 직접 호출
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: 재현 명령
      description: 실행한 정확한 CLI 명령 또는 Python 코드
      render: shell
      placeholder: |
        mcfg generate --metrics src.json --design design.ttf -o out.ttf --apply global,advance,kerning
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대한 동작
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작 / 에러 메시지
      description: 스택 트레이스가 있으면 전체 첨부
      render: shell
    validations:
      required: true

  - type: textarea
    id: font_info
    attributes:
      label: 입력 폰트 정보 (라이센스 허용 시)
      description: |
        폰트 자체는 첨부하지 마세요 (라이센스 위험). 다음 정보로 충분합니다:
        - 폰트 family name
        - 컨테이너 (TTF / OTF / WOFF2)
        - outline (glyf / CFF)
        - upm
        - 글리프 수 (`maxp.numGlyphs`)
        - 사용한 옵션 (`--include-kerning` 등)
      placeholder: |
        Source: NotoSansKR Regular, TTF, glyf, upm=1000, 24,853 glyphs
        Design: Pretendard Regular, TTF, glyf, upm=2048, 14,716 glyphs
        Options: --apply global,advance,kerning,gsub --match-upm

  - type: textarea
    id: extra
    attributes:
      label: 추가 컨텍스트
      description: 스크린샷, 관련 이슈 링크 등
