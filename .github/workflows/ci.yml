name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} · py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: pytest
        run: pytest -v

      - name: CLI smoke test
        run: |
          mcfg --version
          mcfg --help
          mcfg extract --help
          mcfg compare --help
          mcfg generate --help
          mcfg validate --help

  build:
    # Verify sdist + wheel build cleanly. Runs once on Linux / latest stable
    # Python — packaging concerns are OS-agnostic.
    name: build · sdist+wheel
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tooling
        run: pip install build

      - name: python -m build
        run: python -m build

      - name: Verify wheel installs cleanly
        run: |
          python -m venv /tmp/install_check
          /tmp/install_check/bin/pip install dist/*.whl
          /tmp/install_check/bin/mcfg --version

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          retention-days: 7
